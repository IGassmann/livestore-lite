name: Deploy production

on:
  workflow_dispatch:
    inputs:
      target:
        description: Which prod surface(s) to deploy
        required: true
        type: choice
        default: all
        options: [docs, examples, search, all]

permissions:
  contents: read
  id-token: write

env:
  CI: 'true'
  FORCE_SETUP: '1'

jobs:
  deploy-docs:
    if: ${{ inputs.target == 'docs' || inputs.target == 'all' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-vite-plus
      - name: Set OTEL_EXPORTER_OTLP_HEADERS environment variable
        env:
          GRAFANA_CLOUD_OTLP_INSTANCE_ID: '1227256'
          GRAFANA_CLOUD_OTLP_API_KEY: ${{ secrets.GRAFANA_CLOUD_OTLP_API_KEY }}
        run: |
          echo "OTEL_EXPORTER_OTLP_HEADERS=Authorization=Basic $(echo -n "$GRAFANA_CLOUD_OTLP_INSTANCE_ID:$GRAFANA_CLOUD_OTLP_API_KEY" | base64 -w 0)" >> $GITHUB_ENV
          echo "GRAFANA_ENDPOINT=https://livestore.grafana.net" >> $GITHUB_ENV
          echo "OTEL_EXPORTER_OTLP_ENDPOINT=https://otlp-gateway-prod-us-east-2.grafana.net/otlp" >> $GITHUB_ENV
          # Disable in Vite (otherwise CORS issues)
          echo "VITE_OTEL_EXPORTER_OTLP_ENDPOINT=" >> $GITHUB_ENV
      - id: docs-snippet-cache-key
        name: Compute docs snippet cache key
        uses: ./.github/actions/docs-snippet-cache-key
      - id: docs-snippet-cache
        name: Restore docs snippet cache
        uses: actions/cache/restore@v6
        with:
          path: docs/node_modules/.astro-twoslash-code
          key: ${{ steps.docs-snippet-cache-key.outputs.key }}
          restore-keys: |
            ${{ steps.docs-snippet-cache-key.outputs.restore-key }}
      - name: Build + deploy docs to Netlify
        run: vp run -w -v docs:deploy:prod:phase:build-deploy
      - name: Save docs snippet cache
        if: ${{ success() && steps.docs-snippet-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v6
        with:
          path: docs/node_modules/.astro-twoslash-code
          key: ${{ steps.docs-snippet-cache-key.outputs.key }}
      - name: Verify docs deploy
        run: vp run -w -v docs:deploy:prod:phase:verify
      - name: Purge Netlify CDN
        run: vp run -w -v docs:deploy:prod:phase:purge
      - name: Collect docs deploy diagnostics on failure
        if: ${{ failure() }}
        run: vp run -w -v docs:deploy:prod:diagnostics
      - name: Upload docs prod deploy logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: 'docs-prod-deploy-logs-${{ github.run_id }}-${{ github.run_attempt }}'
          path: tmp/ci-docs-prod/
          if-no-files-found: ignore
          retention-days: 14
  deploy-examples:
    if: ${{ inputs.target == 'examples' || inputs.target == 'all' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-vite-plus
      - name: Restore Vite Task cache
        id: vite-task-cache
        uses: actions/cache/restore@v6
        with:
          path: node_modules/.vite/task-cache
          key: vite-task-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            vite-task-${{ runner.os }}-${{ runner.arch }}-
      - name: Set OTEL_EXPORTER_OTLP_HEADERS environment variable
        env:
          GRAFANA_CLOUD_OTLP_INSTANCE_ID: '1227256'
          GRAFANA_CLOUD_OTLP_API_KEY: ${{ secrets.GRAFANA_CLOUD_OTLP_API_KEY }}
        run: |
          echo "OTEL_EXPORTER_OTLP_HEADERS=Authorization=Basic $(echo -n "$GRAFANA_CLOUD_OTLP_INSTANCE_ID:$GRAFANA_CLOUD_OTLP_API_KEY" | base64 -w 0)" >> $GITHUB_ENV
          echo "GRAFANA_ENDPOINT=https://livestore.grafana.net" >> $GITHUB_ENV
          echo "OTEL_EXPORTER_OTLP_ENDPOINT=https://otlp-gateway-prod-us-east-2.grafana.net/otlp" >> $GITHUB_ENV
          # Disable in Vite (otherwise CORS issues)
          echo "VITE_OTEL_EXPORTER_OTLP_ENDPOINT=" >> $GITHUB_ENV
      - name: Build production example workers
        run: vp run -w -v examples:deploy:build:prod
      - name: Save Vite Task cache
        if: success()
        uses: actions/cache/save@v6
        with:
          path: node_modules/.vite/task-cache
          key: ${{ steps.vite-task-cache.outputs.cache-primary-key }}
      - name: Deploy production examples
        run: vp run -w -v examples:deploy:prod:no-build
  deploy-search:
    if: ${{ inputs.target == 'search' || inputs.target == 'all' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-vite-plus
      - name: Sync production docs search
        run: vp run -w -v docs:search:sync:prod
