name: Sync docs to Mixedbread Vector Store

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Docs search target to sync'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
  push:
    branches: [main]
    paths:
      - docs/src/content/**/*.md
      - docs/src/content/**/*.mdx

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true

      - name: Sync vector store
        shell: bash
        working-directory: ./docs
        env:
          MXBAI_API_KEY: ${{ secrets.MXBAI_API_KEY }}
          MXBAI_VECTOR_STORE_ID_DEV: ${{ secrets.MXBAI_VECTOR_STORE_ID_DEV }}
          MXBAI_VECTOR_STORE_ID_PROD: ${{ secrets.MXBAI_VECTOR_STORE_ID_PROD }}
          MXBAI_VECTOR_STORE_ID_LEGACY: ${{ secrets.MXBAI_VECTOR_STORE_ID }}
          SYNC_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.target || 'dev' }}
        run: |
          set -euo pipefail
          if [ -z "${MXBAI_API_KEY:-}" ]; then
            echo "::notice::Skipping Mixedbread sync: MXBAI_API_KEY is not configured"
            exit 0
          fi

          if [ "$SYNC_TARGET" = "prod" ]; then
            vector_store_id="${MXBAI_VECTOR_STORE_ID_PROD:-}"
          else
            vector_store_id="${MXBAI_VECTOR_STORE_ID_DEV:-${MXBAI_VECTOR_STORE_ID_LEGACY:-}}"
          fi

          if [ -z "$vector_store_id" ]; then
            echo "::notice::Skipping Mixedbread sync: no vector store id is configured for target ${SYNC_TARGET}"
            exit 0
          fi

          vp dlx @mixedbread/cli@2.3.2 store sync "$vector_store_id" "./src/content/**/*.mdx" "./src/content/**/*.md" --yes --strategy fast
