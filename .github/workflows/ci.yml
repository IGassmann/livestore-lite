name: ci

run-name: "${{ github.event.pull_request.title || format('Push to {0}', github.ref_name) }} (${{ github.event.pull_request.head.sha || github.sha }})"

permissions:
  id-token: write
  contents: read

on:
  push:
    branches: [main]
  workflow_dispatch: {}
  pull_request: {}

env:
  GITHUB_BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
  FORCE_SETUP: '1'
  CI: 'true'

jobs:
  lint:
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-vite-plus
      - name: Restore Vite Task cache
        id: vite-task-cache
        uses: actions/cache/restore@v6
        with:
          path: node_modules/.vite/task-cache
          key: vite-task-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            vite-task-${{ runner.os }}-${{ runner.arch }}-
      - name: Run static checks
        run: vp run -w -v ci:check
      - name: Save Vite Task cache
        if: success()
        uses: actions/cache/save@v6
        with:
          path: node_modules/.vite/task-cache
          key: ${{ steps.vite-task-cache.outputs.cache-primary-key }}
  changeset-check:
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-vite-plus
      - name: Fetch changeset comparison base
        run: 'git fetch origin "${{ github.base_ref }}" --depth=1'
      - name: Check release intent
        run: vp run -w -v release:changeset:check-pr
      - name: Check changeset bodies
        run: vp run -w -v release:changeset:check-bodies
  type-check:
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-vite-plus
      - name: Restore Vite Task cache
        id: vite-task-cache
        uses: actions/cache/restore@v6
        with:
          path: node_modules/.vite/task-cache
          key: vite-task-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            vite-task-${{ runner.os }}-${{ runner.arch }}-
      - name: Run type-check
        run: vp run -w -v ci:ts:build
      - name: Save Vite Task cache
        if: success()
        uses: actions/cache/save@v6
        with:
          path: node_modules/.vite/task-cache
          key: ${{ steps.vite-task-cache.outputs.cache-primary-key }}
  test-unit:
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-vite-plus
      - name: Restore Vite Task cache
        id: vite-task-cache
        uses: actions/cache/restore@v6
        with:
          path: node_modules/.vite/task-cache
          key: vite-task-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            vite-task-${{ runner.os }}-${{ runner.arch }}-
      - name: Run unit tests
        run: vp run -w -v ci:test:unit
      - name: Save Vite Task cache
        if: success()
        uses: actions/cache/save@v6
        with:
          path: node_modules/.vite/task-cache
          key: ${{ steps.vite-task-cache.outputs.cache-primary-key }}
  test-integration-sync-provider:
    strategy:
      fail-fast: false
      matrix:
        provider:
          - mock
          - cf-http-d1
          - cf-http-do
          - cf-ws-d1
          - cf-ws-do
          - cf-do-rpc-d1
          - cf-do-rpc-do
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-vite-plus
      - name: Install Nix for wa-sqlite build
        uses: DeterminateSystems/nix-installer-action@a7ad9c4f0c65208097f4d34f3cfa1913b80cce5c
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            access-tokens = github.com=${{ github.token }}
          summarize: true
      - name: Set OTEL_EXPORTER_OTLP_HEADERS environment variable
        env:
          GRAFANA_CLOUD_OTLP_INSTANCE_ID: '1227256'
          GRAFANA_CLOUD_OTLP_API_KEY: ${{ secrets.GRAFANA_CLOUD_OTLP_API_KEY }}
        run: |
          echo "OTEL_EXPORTER_OTLP_HEADERS=Authorization=Basic $(echo -n "$GRAFANA_CLOUD_OTLP_INSTANCE_ID:$GRAFANA_CLOUD_OTLP_API_KEY" | base64 -w 0)" >> $GITHUB_ENV
          echo "GRAFANA_ENDPOINT=https://livestore.grafana.net" >> $GITHUB_ENV
          echo "OTEL_EXPORTER_OTLP_ENDPOINT=https://otlp-gateway-prod-us-east-2.grafana.net/otlp" >> $GITHUB_ENV
          # Disable in Vite (otherwise CORS issues)
          echo "VITE_OTEL_EXPORTER_OTLP_ENDPOINT=" >> $GITHUB_ENV
      - name: 'Run sync-provider tests for ${{ matrix.provider }}'
        env:
          TEST_SYNC_PROVIDER: ${{ matrix.provider }}
        run: vp run -w -v test:integration:sync-provider:matrix
  test-integration-playwright:
    strategy:
      matrix:
        suite: [misc, todomvc, devtools]
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-vite-plus
      - name: Install Playwright browsers
        run: vp exec --filter @local/tests-integration -- playwright install --with-deps chromium
      - name: Set OTEL_EXPORTER_OTLP_HEADERS environment variable
        env:
          GRAFANA_CLOUD_OTLP_INSTANCE_ID: '1227256'
          GRAFANA_CLOUD_OTLP_API_KEY: ${{ secrets.GRAFANA_CLOUD_OTLP_API_KEY }}
        run: |
          echo "OTEL_EXPORTER_OTLP_HEADERS=Authorization=Basic $(echo -n "$GRAFANA_CLOUD_OTLP_INSTANCE_ID:$GRAFANA_CLOUD_OTLP_API_KEY" | base64 -w 0)" >> $GITHUB_ENV
          echo "GRAFANA_ENDPOINT=https://livestore.grafana.net" >> $GITHUB_ENV
          echo "OTEL_EXPORTER_OTLP_ENDPOINT=https://otlp-gateway-prod-us-east-2.grafana.net/otlp" >> $GITHUB_ENV
          # Disable in Vite (otherwise CORS issues)
          echo "VITE_OTEL_EXPORTER_OTLP_ENDPOINT=" >> $GITHUB_ENV
      - name: Run integration tests
        env:
          PLAYWRIGHT_SUITE: ${{ matrix.suite }}
        run: vp run -w -v test:integration:playwright:suite
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: 'playwright-report-${{ matrix.suite }}'
          path: tests/integration/playwright-report/
          retention-days: 30
      - name: Upload trace
        if: ${{ !cancelled() }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          PLAYWRIGHT_SUITE: ${{ matrix.suite }}
        run: vp run -w -v test:integration:playwright:upload-trace
  perf-test:
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: ./.github/actions/setup-vite-plus
      - name: Install Playwright browsers
        run: vp exec --filter @local/tests-perf -- playwright install --with-deps chromium
      - name: Set OTEL_EXPORTER_OTLP_HEADERS environment variable
        env:
          GRAFANA_CLOUD_OTLP_INSTANCE_ID: '1227256'
          GRAFANA_CLOUD_OTLP_API_KEY: ${{ secrets.GRAFANA_CLOUD_OTLP_API_KEY }}
        run: |
          echo "OTEL_EXPORTER_OTLP_HEADERS=Authorization=Basic $(echo -n "$GRAFANA_CLOUD_OTLP_INSTANCE_ID:$GRAFANA_CLOUD_OTLP_API_KEY" | base64 -w 0)" >> $GITHUB_ENV
          echo "GRAFANA_ENDPOINT=https://livestore.grafana.net" >> $GITHUB_ENV
          echo "OTEL_EXPORTER_OTLP_ENDPOINT=https://otlp-gateway-prod-us-east-2.grafana.net/otlp" >> $GITHUB_ENV
          # Disable in Vite (otherwise CORS issues)
          echo "VITE_OTEL_EXPORTER_OTLP_ENDPOINT=" >> $GITHUB_ENV
      - name: Run performance tests
        run: vp run -w -v test:perf
  wa-sqlite-test:
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-vite-plus
      - name: Install Nix for wa-sqlite build
        uses: DeterminateSystems/nix-installer-action@a7ad9c4f0c65208097f4d34f3cfa1913b80cce5c
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            access-tokens = github.com=${{ github.token }}
          summarize: true
      - name: Set OTEL_EXPORTER_OTLP_HEADERS environment variable
        env:
          GRAFANA_CLOUD_OTLP_INSTANCE_ID: '1227256'
          GRAFANA_CLOUD_OTLP_API_KEY: ${{ secrets.GRAFANA_CLOUD_OTLP_API_KEY }}
        run: |
          echo "OTEL_EXPORTER_OTLP_HEADERS=Authorization=Basic $(echo -n "$GRAFANA_CLOUD_OTLP_INSTANCE_ID:$GRAFANA_CLOUD_OTLP_API_KEY" | base64 -w 0)" >> $GITHUB_ENV
          echo "GRAFANA_ENDPOINT=https://livestore.grafana.net" >> $GITHUB_ENV
          echo "OTEL_EXPORTER_OTLP_ENDPOINT=https://otlp-gateway-prod-us-east-2.grafana.net/otlp" >> $GITHUB_ENV
          # Disable in Vite (otherwise CORS issues)
          echo "VITE_OTEL_EXPORTER_OTLP_ENDPOINT=" >> $GITHUB_ENV
      - name: Build wa-sqlite
        run: vp run -w -v test:integration:wa-sqlite:build
      - name: Run wa-sqlite tests
        run: vp run -w -v test:integration:wa-sqlite
  build-and-deploy-examples-src:
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-vite-plus
      - name: Restore Vite Task cache
        id: vite-task-cache
        uses: actions/cache/restore@v6
        with:
          path: node_modules/.vite/task-cache
          key: vite-task-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            vite-task-${{ runner.os }}-${{ runner.arch }}-
      - name: Install examples dependencies
        run: vp run -w -v examples:install
      - name: Build examples
        run: vp run -w -v ci:examples:build-ready
      - name: Install example Playwright browsers
        run: vp exec --filter livestore-example-web-linearlite -- playwright install --with-deps chromium
      - name: Test examples
        run: vp run -w -v examples:test
      - id: cloudflare-deploy
        name: Detect Cloudflare deploy credentials
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [[ -n "${CLOUDFLARE_ACCOUNT_ID}" && -n "${CLOUDFLARE_API_TOKEN}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build example workers for deploy
        if: ${{ github.event.pull_request.head.repo.fork != true && steps.cloudflare-deploy.outputs.enabled == 'true' }}
        run: vp run -w -v ci:examples:deploy-build
      - id: deploy-examples
        name: Deploy examples to Cloudflare
        if: ${{ github.event.pull_request.head.repo.fork != true && steps.cloudflare-deploy.outputs.enabled == 'true' }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: vp run -w -v examples:deploy:no-build
      - name: Upload examples deploy workflow report
        if: ${{ github.event_name == 'pull_request' && steps.deploy-examples.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: examples-deploy-workflow-report
          path: '${{ runner.temp }}/workflow-reports/examples-deploy.jsonl'
          if-no-files-found: warn
          retention-days: 14
      - name: Validate hosted example links
        if: ${{ steps.deploy-examples.outcome == 'success' }}
        run: vp run -w -v examples:validate-links
      - name: Save Vite Task cache
        if: success()
        uses: actions/cache/save@v6
        with:
          path: node_modules/.vite/task-cache
          key: ${{ steps.vite-task-cache.outputs.cache-primary-key }}
  build-deploy-docs:
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-vite-plus
      - name: Restore Vite Task cache
        id: vite-task-cache
        uses: actions/cache/restore@v6
        with:
          path: node_modules/.vite/task-cache
          key: vite-task-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            vite-task-${{ runner.os }}-${{ runner.arch }}-
      - id: docs-snippet-cache-key
        name: Compute docs snippet cache key
        uses: ./.github/actions/docs-snippet-cache-key
      - id: docs-snippet-cache
        name: Restore docs snippet cache
        uses: actions/cache/restore@v6
        with:
          path: docs/node_modules/.astro-twoslash-code
          key: ${{ steps.docs-snippet-cache-key.outputs.key }}
          restore-keys: |
            ${{ steps.docs-snippet-cache-key.outputs.restore-key }}
      - name: Configure Puppeteer cache
        run: echo "PUPPETEER_CACHE_DIR=${RUNNER_TEMP}/puppeteer" >> "$GITHUB_ENV"
      - name: Install tldraw Chrome
        run: |
          chrome_path="$(vp exec --filter @local/astro-tldraw -- puppeteer browsers install chrome --format '{{path}}' | tail -n 1)"
          if [[ ! -x "$chrome_path" ]]; then
            echo "Installed Chrome executable not found at $chrome_path" >&2
            exit 1
          fi
          echo "PUPPETEER_EXECUTABLE_PATH=$chrome_path" >> "$GITHUB_ENV"
      - name: Install docs Playwright browser
        run: vp exec --filter @local/docs -- playwright install --with-deps chromium
      - name: Build docs
        timeout-minutes: 20
        run: vp run -w -v ci:docs:build
      - name: Save docs snippet cache
        if: ${{ success() && steps.docs-snippet-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v6
        with:
          path: docs/node_modules/.astro-twoslash-code
          key: ${{ steps.docs-snippet-cache-key.outputs.key }}
      - name: Collect docs build diagnostics on failure
        if: ${{ failure() }}
        run: vp run -w -v docs:build:diagnostics
      - name: Upload docs build logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: docs-build-logs
          path: tmp/ci-docs/
          retention-days: 14
      - id: netlify-deploy
        name: Detect Netlify deploy credentials
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          if [[ -n "${NETLIFY_AUTH_TOKEN}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
      - id: deploy-docs
        name: Deploy docs
        if: ${{ success() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork != true) && steps.netlify-deploy.outputs.enabled == 'true' }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: vp run -w -v docs:deploy
      - name: Upload docs deploy workflow report
        if: ${{ github.event_name == 'pull_request' && steps.deploy-docs.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: docs-deploy-workflow-report
          path: '${{ runner.temp }}/workflow-reports/docs-deploy.jsonl'
          if-no-files-found: warn
          retention-days: 14
      - name: Save Vite Task cache
        if: success()
        uses: actions/cache/save@v6
        with:
          path: node_modules/.vite/task-cache
          key: ${{ steps.vite-task-cache.outputs.cache-primary-key }}
