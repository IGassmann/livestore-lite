name: Setup Vite+
description: Install Vite+, provision Node 24 and the pinned package manager, and install workspace dependencies.

runs:
  using: composite
  steps:
    - uses: voidzero-dev/setup-vp@v1
      with:
        node-version: '24'
        cache: true
        run-install: |
          - args: ['--frozen-lockfile']
    - name: Install pnpm compatibility shim
      shell: bash
      run: vp install --global pnpm@11.3.0
