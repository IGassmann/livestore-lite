name: Setup Node and pnpm
description: Install Node 24, activate the pinned pnpm version, and install workspace dependencies.

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: pnpm
    - name: Activate pnpm
      shell: bash
      run: |
        corepack enable
        corepack prepare pnpm@11.3.0 --activate
    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
