packages:
  - docs
  - docs/src/content/_assets/code
  - examples/*
  - packages/@livestore/adapter-cloudflare
  - packages/@livestore/adapter-web
  - packages/@livestore/common
  - packages/@livestore/common-cf
  - packages/@livestore/effect-playwright
  - packages/@livestore/framework-toolkit
  - packages/@livestore/livestore
  - packages/@livestore/peer-deps
  - packages/@livestore/react
  - packages/@livestore/sqlite-wasm
  - packages/@livestore/sync-cf
  - packages/@livestore/utils
  - packages/@livestore/utils-dev
  - packages/@livestore/wa-sqlite
  - packages/@livestore/webmesh
  - packages/@local/astro-tldraw
  - packages/@local/astro-twoslash-code
  - packages/@local/astro-twoslash-code/example
  - packages/@local/shared
  - scripts
  - tests/integration
  - tests/package-common
  - tests/perf
  - tests/perf-eventlog
  - tests/sync-provider
  - tests/wa-sqlite

overrides:
  effect: 3.21.2
  '@effect/platform': 0.96.1
  '@effect/platform-browser': 0.76.0
  '@effect/platform-bun': 0.89.0
  '@effect/platform-node': 0.106.0
  '@effect/platform-node-shared': 0.59.0
  '@effect/cli': 0.75.1
  '@effect/experimental': 0.60.0
  '@effect/opentelemetry': 0.63.0
  '@effect/printer': 0.49.0
  '@effect/printer-ansi': 0.49.0
  '@effect/typeclass': 0.40.0
  react: 19.2.3
  react-dom: 19.2.3
  '@tanstack/router-core': 1.145.7
  '@tanstack/history': 1.145.7
  '@tanstack/react-router': 1.145.7
  '@tanstack/react-start': 1.145.10
  '@tanstack/router-devtools': 1.145.7
  '@tanstack/router-devtools-core': 1.145.7
  '@tanstack/react-router-devtools': 1.145.7
  '@tanstack/router-plugin': 1.145.10
  '@tanstack/start-plugin-core': 1.145.7
  '@tanstack/start-server-core': 1.145.7
  '@tanstack/start-client-core': 1.145.7

packageExtensions:
  '@voidzero-dev/vite-plus-core':
    dependencies:
      vite-plus: 0.2.2
  react-error-boundary:
    dependencies:
      '@types/react': 19.2.7
      '@types/react-dom': 19.2.3
  starlight-auto-sidebar:
    dependencies:
      astro: '>=6.0.0'
  starlight-links-validator:
    dependencies:
      astro: '>=6.0.0'
  starlight-sidebar-topics:
    dependencies:
      astro: '>=6.0.0'
  typedoc:
    dependencies:
      typedoc-plugin-markdown: ^4.8.1
  vite-plus:
    dependencies:
      '@voidzero-dev/vite-plus-darwin-arm64': 0.2.2
      '@voidzero-dev/vite-plus-darwin-x64': 0.2.2
      '@voidzero-dev/vite-plus-linux-arm64-gnu': 0.2.2
      '@voidzero-dev/vite-plus-linux-arm64-musl': 0.2.2
      '@voidzero-dev/vite-plus-linux-x64-gnu': 0.2.2
      '@voidzero-dev/vite-plus-linux-x64-musl': 0.2.2

peerDependencyRules:
  allowedVersions:
    '@effect/experimental': '>=0.58.0'
    '@effect/platform': '>=0.94.2'
    '@effect/rpc': '>=0.73.0'

allowBuilds:
  '@parcel/watcher': true
  '@myobie/pty': true
  esbuild: true
  msgpackr-extract: true
  node-pty: true
  sharp: true
  unix-dgram: true
  '@mixedbread/cli': true
  cbor-extract: true
  dtrace-provider: true
  protobufjs: true
  puppeteer: true
  workerd: true

supportedArchitectures:
  os: [linux, darwin]
  cpu: [x64, arm64]
  libc: [glibc, musl]

dedupePeerDependents: true

strictPeerDependencies: false

injectWorkspacePackages: false

enableGlobalVirtualStore: true

packageImportMethod: clone-or-copy

optimisticRepeatInstall: false

verifyDepsBeforeRun: false

linkWorkspacePackages: true

sideEffectsCache: false

verifyStoreIntegrity: true

strictStorePkgContentCheck: true

pmOnFail: ignore

minimumReleaseAgeExclude:
  - '@voidzero-dev/vite-plus-core@0.2.2'
  - '@voidzero-dev/vite-plus-darwin-arm64@0.2.2'
  - '@voidzero-dev/vite-plus-darwin-x64@0.2.2'
  - '@voidzero-dev/vite-plus-linux-arm64-gnu@0.2.2'
  - '@voidzero-dev/vite-plus-linux-arm64-musl@0.2.2'
  - '@voidzero-dev/vite-plus-linux-x64-gnu@0.2.2'
  - '@voidzero-dev/vite-plus-linux-x64-musl@0.2.2'
  - '@voidzero-dev/vite-plus-win32-arm64-msvc@0.2.2'
  - '@voidzero-dev/vite-plus-win32-x64-msvc@0.2.2'
  - vite-plus@0.2.2
